<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuales Premium | Habilidades que Generan Ingresos</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
            --gold-hover: #f3cf5a;
            --dark: #0f1115;
            --card: #1a1f29;
            --white: #ffffff;
            --bg: #0b0c10;
            --text: #94a3b8;
            --text-title: #ffffff;
            --border: rgba(212, 175, 55, 0.15);
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            --whatsapp: #25D366;
            --overlay: rgba(0,0,0,0.6);
        }

        .light {
            --dark: #f8fafc;
            --card: #ffffff;
            --white: #0f172a;
            --bg: #f1f5f9;
            --text: #475569;
            --text-title: #0f172a;
            --border: rgba(15, 23, 42, 0.1);
            --shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            --overlay: rgba(15,23,42,0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
            padding-top: 75px;
        }

        /* --- HEADER PREMIUM --- */
        header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            z-index: 1000;
            background: rgba(17, 17, 17, 0.85);
            backdrop-filter: blur(12px);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            height: 75px;
            transition: background 0.3s;
        }
        body.light header {
            background: rgba(255, 255, 255, 0.85);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--gold);
            letter-spacing: -0.5px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        nav a {
            color: var(--white);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: .3s;
        }

        nav a:hover {
            color: var(--gold);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .dark-toggle {
            cursor: pointer;
            font-size: 20px;
            color: var(--gold);
            transition: transform 0.3s;
        }
        .dark-toggle:hover { transform: rotate(15deg); }

        .cart-trigger {
            background: var(--card);
            color: var(--gold);
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            transition: 0.3s;
            box-shadow: var(--shadow);
        }
        .cart-trigger:hover {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
        }
        .cart-badge {
            background: #ff3b30;
            color: white;
            font-size: 0.75rem;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* --- HERO --- */
        .hero {
            padding: 100px 5% 80px;
            text-align: center;
            background: radial-gradient(circle at center, rgba(212,175,55,0.08) 0%, transparent 70%);
        }

        .hero h1 {
            font-size: 54px;
            color: var(--text-title);
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -1.5px;
            line-height: 1.1;
        }
        .hero h1 span { color: var(--gold); }

        .hero p {
            font-size: 1.15rem;
            max-width: 650px;
            margin: auto;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 16px 36px;
            background: var(--gold);
            color: #000;
            font-weight: 700;
            border-radius: 12px;
            text-decoration: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(212,175,55,0.15);
        }

        .btn:hover {
            background: var(--gold-hover);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(212,175,55,0.25);
        }

        /* --- STATS --- */
        .stats {
            padding: 40px 5%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .stat {
            background: var(--card);
            padding: 30px 20px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .stat h2 {
            color: var(--gold);
            font-size: 38px;
            font-weight: 800;
            margin-bottom: 5px;
        }
        .stat p { font-size: 0.9rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }

        /* --- CATÁLOGO --- */
        .section-title {
            text-align: center;
            font-size: 36px;
            font-weight: 800;
            margin: 80px 0 20px;
            color: var(--text-title);
            letter-spacing: -0.5px;
        }

        .search-container {
            max-width: 550px;
            margin: 0 auto 40px;
            position: relative;
            width: 90%;
        }
        .search-container i {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            color: var(--gold); font-size: 1.1rem;
        }
        .search {
            width: 100%;
            padding: 16px 20px 16px 55px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--white);
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            box-shadow: var(--shadow);
        }
        .search:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212,175,55,0.15);
        }

        .products {
            padding: 20px 5%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow);
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: rgba(212,175,55,0.4);
        }

        .img-wrapper {
            width: 100%; height: 210px; overflow: hidden; position: relative;
        }
        .card img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.5s ease;
        }
        .card:hover img { transform: scale(1.05); }

        .content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .content h3 {
            font-size: 1.25rem;
            color: var(--white);
            margin-bottom: 8px;
            font-weight: 700;
        }
        .content p { font-size: 0.9rem; line-height: 1.5; margin-bottom: 15px; flex-grow: 1; }

        .price {
            font-size: 26px;
            color: var(--gold);
            font-weight: 800;
            margin-bottom: 15px;
        }

        .buy {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .buy:hover { background: var(--gold-hover); }

        .no-results {
            grid-column: 1 / -1; text-align: center; padding: 40px;
            font-size: 1.1rem; color: var(--text); display: none;
        }

        /* --- OPINIONES --- */
        .testimonials {
            padding: 20px 5% 50px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .testimonial {
            background: var(--card);
            padding: 30px;
            border-radius: 18px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .stars { color: var(--gold); margin-bottom: 12px; font-size: 0.9rem; }
        .testimonial p { font-style: italic; line-height: 1.6; margin-bottom: 15px; }
        .testimonial b { color: var(--white); font-size: 0.95rem; }

        /* --- FAQ --- */
        .faq { padding: 20px 5% 60px; max-width: 750px; margin: 0 auto; }
        details {
            background: var(--card);
            padding: 18px 22px;
            margin-bottom: 15px;
            border-radius: 14px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            cursor: pointer;
        }
        summary { font-weight: 700; color: var(--white); font-size: 1.05rem; outline: none; }
        details p { padding-top: 12px; line-height: 1.6; font-size: 0.95rem; }

        /* --- SIDEBAR PANEL CARRITO --- */
        .cart-sidebar {
            position: fixed; top: 0; right: -420px; width: 100%; max-width: 420px; height: 100%;
            background: var(--card); border-left: 1px solid var(--border); box-shadow: -10px 0 30px rgba(0,0,0,0.2);
            z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column;
        }
        .cart-sidebar.open { right: 0; }
        
        .cart-header { padding: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .cart-header h2 { font-size: 1.3rem; font-weight: 800; color: var(--white); }
        .close-cart { font-size: 1.8rem; cursor: pointer; color: var(--white); border: none; background: none; }
        
        .cart-items-wrapper { flex-grow: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .cart-item { display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .cart-item-info { flex-grow: 1; }
